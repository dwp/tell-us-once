{% extends "layouts/main.html" %}

{% block pageTitle %}
Enter an address
{% endblock %}

{% block beforeContent %}
{{ govukBackLink({
  text: "Back",
  href: "javascript:window.history.back()"
}) }}
{% endblock %}

{% block content %}
<div class="govuk-grid-row">
  <div class="govuk-grid-column-two-thirds">
<form class="form" action="confirm-address" method="post">
<div class="govuk-form-group">
    <fieldset class="govuk-fieldset">
  <legend class="govuk-fieldset__legend govuk-fieldset__legend--l">
    <h1 class="govuk-fieldset__heading">
      Enter an address
    </h1>
  </legend>
  <div class="govuk-form-group">
    <label class="govuk-label" for="address-line-1">
      Address line 1
    </label>
    <input class="govuk-input" id="address-line-2" name="deceased-address-line-1" type="text" autocomplete="address-line1">
  </div>
  <div class="govuk-form-group">
    <label class="govuk-label" for="address-line-2">
      Address line 2 (optional)
    </label>
    <input class="govuk-input" id="address-line-2" name="deceased-address-line-2" type="text" autocomplete="address-line2">
  </div>
  <div class="govuk-form-group">
    <label class="govuk-label" for="address-town">
      Town or city
    </label>
    <input class="govuk-input govuk-!-width-two-thirds" id="address-town" name="deceased-address-town" type="text" autocomplete="address-level2">
  </div>
  <div class="govuk-form-group">
    <label class="govuk-label" for="address-county">
      County (optional)
    </label>
    <input class="govuk-input govuk-!-width-two-thirds" id="address-county" name="deceased-address-county" type="text">
  </div>
  <div class="govuk-form-group">
    <label class="govuk-label" for="address-postcode">
      Postcode
    </label>
    <input class="govuk-input govuk-input--width-10" id="address-postcode" name="deceased-postcode" type="text" autocomplete="postal-code">
  </div>
</fieldset>
  </div>
  <button type="submit" class="govuk-button" data-module="govuk-button">
    Use this address
  </button>
  <p class="govuk-body govuk-!-margin-bottom-0"><a href="enter-the-address-of-the-person-whos-died" class="govuk-link">Lookup address by postcode</a></p>

      </fieldset>
    </form>

  </div>
</div>
{% endblock %}
